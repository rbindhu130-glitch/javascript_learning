<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Feed</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #fafafa;
        display: flex;
        justify-content: center;
        padding: 20px 0;
      }

      #insta-feed {
        width: 400px;
      }

      .post {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      .post-header img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin-right: 10px;
      }

      .post-header {
        display: flex;
        align-items: center;
        padding: 10px;
      }

      .post-image {
        width: 100%;
        object-fit: cover;
        max-height: 400px;
      }

      .post-body {
        padding: 10px;
      }

      .likes {
        font-weight: bold;
        margin: 5px 0;
        display: flex;
        align-items: center;
      }

      .like-btn {
        cursor: pointer;
        font-size: 22px;
        margin-right: 6px;
        transition: 0.2s ease;
      }

      .like-btn.liked {
        color: red;
      }

      .description {
        margin-bottom: 5px;
      }

      .timestamp {
        font-size: 0.8em;
        color: #888;
      }
    </style>
  </head>

  <body>
    <div id="insta-feed"></div>

    <script>
      async function fetchPosts() {
        try {
          const res = await fetch(
            "https://my-json-server.typicode.com/msbAtGit/instafeed-api/posts"
          );

          const posts = await res.json();
          const container = document.getElementById("insta-feed");

          posts.forEach((post) => {
            const div = document.createElement("div");
            div.classList.add("post");

            div.innerHTML = `
              <div class="post-header">
                <img src="${post.profilePic}" alt="${post.username}">
                <strong>${post.username}</strong>
              </div>

              <img class="post-image" src="${post.image}" alt="post-image">

              <div class="post-body">
                <div class="likes">
                  <span class="like-btn">♡</span>
                  <span class="like-count">${post.likes}</span> likes
                </div>

                <div class="description">${post.description}</div>
                <div class="comments">${post.comments} Comments</div>
                <div class="timestamp">${post.timestamp}</div>
              </div>
            `;

            container.appendChild(div);

          
            const likeBtn = div.querySelector(".like-btn");
            const likeCount = div.querySelector(".like-count");

            let liked = false;

            likeBtn.addEventListener("click", () => {
              if (!liked) {
                likeBtn.textContent = "❤️";
                likeBtn.classList.add("liked");
                likeCount.textContent =
                  Number(likeCount.textContent) + 1;
                liked = true;
              } else {
                likeBtn.textContent = "♡";
                likeBtn.classList.remove("liked");
                likeCount.textContent =
                  Number(likeCount.textContent) - 1;
                liked = false;
              }
            });
          });
        } catch (error) {
          console.error("Loading feed....", error);
        }
      }

      fetchPosts();
    </script>
  </body>
</html>
