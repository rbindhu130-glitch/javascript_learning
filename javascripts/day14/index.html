<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Feed Clone</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #fafafa;
    display: flex;
    justify-content: center;
    padding: 20px 0;
  }

  #insta-feed {
    width: 400px;
  }

  .post {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }

  .post-header {
    display: flex;
    align-items: center;
    padding: 10px;
  }

  .post-header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
  }

  .post-image {
    width: 100%;
    object-fit: cover;
    max-height: 400px;
  }

  .post-body {
    padding: 10px;
  }

  .likes {
    font-weight: bold;
    margin: 5px 0;
  }

  .description {
    margin-bottom: 5px;
  }

  .timestamp {
    font-size: 0.8em;
    color: #888;
  }

  .like-btn {
    cursor: pointer;
    color: #ed4956;
    user-select: none;
  }
</style>
</head>
<body>

<div id="insta-feed"></div>

<script>
async function loadFeed() {
  try {
    const res = await fetch('https://my-json-server.typicode.com/msbAtGit/instafeed-api/posts');
    const posts = await res.json();

    const container = document.getElementById('insta-feed');

    posts.forEach(post => {
      const div = document.createElement('div');
      div.classList.add('post');

      div.innerHTML = `
        <div class="post-header">
          <img src="${post.profilePic}" alt="${post.username}">
          <strong>${post.username}</strong>
        </div>
        <img class="post-image" src="${post.image}" alt="post image">
        <div class="post-body">
          <div class="likes">
            <span class="like-btn"></span> <span class="like-count">${post.likes}</span> likes
          </div>
          <div class="description">${post.description}</div>
          <div class="comments">${post.comments} comments</div>
          <div class="timestamp">${post.timestamp}</div>
        </div>
      `;

      container.appendChild(div);

      // Like button functionality
      const likeBtn = div.querySelector('.like-btn');
      const likeCount = div.querySelector('.like-count');
      likeBtn.addEventListener('click', () => {
        let currentLikes = parseInt(likeCount.textContent);
        currentLikes++;
        likeCount.textContent = currentLikes;
      });
    });

  } catch (err) {
    console.error('Error loading feed:', err);
  }
}

loadFeed();
</script>

</body>
</html>
